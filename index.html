<style>
:root{
  color-scheme: light;
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --text-primary:#0b0b0b; --text-secondary:#52514e; --muted:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,0.10);
  --series-1:#2a78d6;
  --accent-soft:#cde2fb;
  --good:#0ca30c;
}
@media (prefers-color-scheme: dark){
  :root:where(:not([data-theme="light"])){
    color-scheme: dark;
    --surface-1:#1a1a19; --page:#0d0d0d;
    --text-primary:#ffffff; --text-secondary:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.10);
    --series-1:#3987e5;
    --accent-soft:#184f95;
  }
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --surface-1:#1a1a19; --page:#0d0d0d;
  --text-primary:#ffffff; --text-secondary:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.10);
  --series-1:#3987e5;
  --accent-soft:#184f95;
}

*{box-sizing:border-box}
body{
  margin:0; background:var(--page); color:var(--text-primary);
  font-family:system-ui,-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
  font-size:14px; line-height:1.5;
}
header{padding:20px 20px 0;max-width:1240px;margin:0 auto}
h1{font-size:19px;margin:0 0 2px;font-weight:650}
.sub{color:var(--text-secondary);font-size:13px;margin:0}
main{
  max-width:1240px;margin:0 auto;padding:16px 20px 48px;
  display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;
}
@media (max-width:940px){ main{grid-template-columns:1fr} }

.card{
  background:var(--surface-1);border:1px solid var(--border);
  border-radius:12px;padding:16px;
}
.card + .card{margin-top:16px}
h2{font-size:14px;margin:0 0 12px;font-weight:650}
.hint{color:var(--muted);font-size:12px;margin:0}

/* ---- tabs ---- */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--page);
  border:1px solid var(--border);border-radius:10px;padding:4px}
.tab{
  flex:1;padding:9px 8px;border:0;border-radius:7px;background:transparent;
  color:var(--text-secondary);font:inherit;font-weight:550;cursor:pointer;
}
.tab:hover{color:var(--text-primary)}
.tab[aria-selected="true"]{background:var(--series-1);color:#fff}

/* ---- sliders ---- */
.ctrl{margin-bottom:14px}
.ctrl:last-child{margin-bottom:0}
.ctrl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.ctrl-label{font-weight:550;font-size:13px}
.ctrl-val{font-variant-numeric:tabular-nums;font-weight:650;font-size:13px}
.badge{
  font-size:11px;font-weight:600;padding:1px 6px;border-radius:5px;margin-left:6px;
  background:var(--accent-soft);color:var(--text-primary);
}
.badge.ctl{background:transparent;color:var(--muted);border:1px solid var(--border)}
.ctrl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ctrl-head h2{margin:0}
.warn{
  display:flex;gap:8px;align-items:flex-start;margin-top:14px;padding:9px 11px;
  border-radius:8px;font-size:12px;line-height:1.45;
  background:rgba(250,178,25,.12);border:1px solid rgba(250,178,25,.45);
  color:var(--text-secondary);
}
.warn strong{color:var(--text-primary)}
.warn svg{flex:none;width:14px;height:14px;margin-top:1px}
.warn > div{min-width:0}           /* 글자가 세로로 쪼개지지 않도록 */
.warn button{margin-top:6px}
td.mismatch{color:var(--muted)}
.flag{
  display:inline-block;margin-left:5px;font-size:10px;font-weight:700;
  color:#b07400;border:1px solid rgba(250,178,25,.6);border-radius:4px;padding:0 4px;
  vertical-align:1px;
}
/* 커스텀 슬라이더 — 네이티브 input은 투명하게 덮어 조작만 담당한다 */
.slider{position:relative;height:36px;display:flex;align-items:center}
.slider .track{
  position:absolute;left:0;right:0;height:12px;border-radius:99px;
  background:var(--grid);box-shadow:inset 0 1px 2px rgba(0,0,0,.14);
}
.slider .fill{
  position:absolute;left:0;height:12px;border-radius:99px;width:0;
  background:linear-gradient(90deg,var(--fill-a,var(--series-1)),var(--fill-b,var(--series-1)));
}
.slider .thumb{
  position:absolute;top:50%;left:0;width:32px;height:32px;margin-left:-16px;
  transform:translateY(-50%);border-radius:50%;background:var(--surface-1);
  border:2px solid var(--fill-b,var(--series-1));
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 2px 6px rgba(0,0,0,.22);pointer-events:none;
  transition:box-shadow .15s, transform .08s;
}
.slider input{
  position:absolute;left:0;width:100%;height:36px;margin:0;
  opacity:0;cursor:grab;z-index:2;-webkit-appearance:none;appearance:none;background:transparent;
}
.slider input:active{cursor:grabbing}
.slider input::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px}
.slider input::-moz-range-thumb{width:32px;height:32px;border:0;opacity:0}
.slider input:active + .thumb,
.slider input:focus-visible + .thumb{
  transform:translateY(-50%) scale(1.12);
  box-shadow:0 2px 10px rgba(0,0,0,.28), 0 0 0 4px color-mix(in srgb,var(--fill-b,var(--series-1)) 32%,transparent);
}
.slider input:disabled{cursor:not-allowed}
.slider.off .thumb,.slider.off .fill{opacity:.45}
.ticks{display:flex;justify-content:space-between;color:var(--muted);
  font-size:11px;font-variant-numeric:tabular-nums;margin-top:2px}

/* =========================================================
   유리 수조 (Glassmorphism)
   ========================================================= */
.tank{
  --lit:1;                                   /* 빛의 세기 0~1 — JS가 설정 */
  position:relative;height:250px;border-radius:14px;margin-bottom:14px;
  isolation:isolate;
  /* 유리 너머로 비치는 배경 */
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(255,240,190,calc(.10 + var(--lit)*.30)) 0%, transparent 60%),
    linear-gradient(160deg,#123e5e 0%,#0d3350 100%);
  box-shadow:
    0 10px 28px rgba(8,30,48,.34),
    inset 0 1px 0 rgba(255,255,255,.30);
}
.scene{position:absolute;inset:0;border-radius:14px;overflow:hidden}
.water{
  position:absolute;inset:14px 0 0;
  background:
    linear-gradient(180deg,
      rgba(120,205,240,.34) 0%,
      rgba(46,140,196,.30) 42%,
      rgba(12,58,92,.42) 100%);
  backdrop-filter:blur(1px);
}
.surface{                                     /* 수면 — 굴절 하이라이트 */
  position:absolute;top:12px;left:0;right:0;height:5px;
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0));
  box-shadow:0 0 10px rgba(190,235,255,.45);
}
.sand{position:absolute;bottom:0;left:0;right:0;height:26px;
  background:linear-gradient(180deg,#7a6a51,#463c2e);
  box-shadow:inset 0 3px 7px rgba(0,0,0,.30)}

/* ---- 유리벽 ---- */
.glass{position:absolute;inset:0;border-radius:14px;pointer-events:none;overflow:hidden}
/* 좌우 벽 — 두꺼운 유리라 뒤가 굴절되어 흐려진다 */
.glass .wall{
  position:absolute;top:0;bottom:0;width:15px;
  backdrop-filter:blur(3px) saturate(1.35);
}
.glass .wall.l{
  left:0;border-radius:14px 0 0 14px;
  background:linear-gradient(90deg,rgba(255,255,255,.42),rgba(255,255,255,.05));
  box-shadow:inset 1px 0 0 rgba(255,255,255,.55);
}
.glass .wall.r{
  right:0;border-radius:0 14px 14px 0;
  background:linear-gradient(270deg,rgba(255,255,255,.30),rgba(255,255,255,.04));
  box-shadow:inset -1px 0 0 rgba(255,255,255,.42);
}
.glass .rim{                                  /* 비커 입구 테두리 */
  position:absolute;top:0;left:0;right:0;height:13px;
  background:linear-gradient(180deg,rgba(255,255,255,.50),rgba(255,255,255,.06));
  border-radius:14px 14px 0 0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 1px 5px rgba(255,255,255,.22);
  backdrop-filter:blur(2px);
}
.glass .base{                                 /* 바닥 유리 두께 */
  position:absolute;bottom:0;left:0;right:0;height:7px;
  background:linear-gradient(0deg,rgba(255,255,255,.26),transparent);
  border-radius:0 0 14px 14px;
}
.glass .glare{                                /* 사선 반사광 */
  position:absolute;border-radius:99px;
  background:linear-gradient(180deg,rgba(255,255,255,.30),rgba(255,255,255,.02));
  transform:rotate(19deg);filter:blur(.6px);
}
.glass .glare.a{top:22px;left:26px;width:15px;height:150px}
.glass .glare.b{top:34px;left:50px;width:6px;height:88px;opacity:.75}
/* 유리 외곽선 */
.tank::after{
  content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;
  border:1px solid rgba(255,255,255,.34);
  box-shadow:inset 0 0 22px rgba(255,255,255,.13);
}

/* ---- 조명 ---- */
.lamp{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:200px;height:96px;pointer-events:none;z-index:3;
}
.lamp .bulb{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 42% 34%,
    #fffdf2 0%, #fff6cf 32%, #ffe58a 62%, #f7c93f 100%);
  opacity:calc(.32 + var(--lit)*.68);
  box-shadow:
    0 0 calc(10px + var(--lit)*26px) calc(1px + var(--lit)*7px)  rgba(255,236,160,calc(var(--lit)*.95)),
    0 0 calc(26px + var(--lit)*62px) calc(4px + var(--lit)*20px) rgba(255,224,120,calc(var(--lit)*.62)),
    0 0 calc(50px + var(--lit)*120px)calc(8px + var(--lit)*40px) rgba(255,210,80, calc(var(--lit)*.34));
  filter:drop-shadow(0 0 calc(var(--lit)*16px) rgba(255,240,170,.9));
}
.lamp .cap{                                   /* 소켓 */
  position:absolute;top:2px;left:50%;transform:translateX(-50%);
  width:22px;height:14px;border-radius:4px 4px 2px 2px;
  background:linear-gradient(180deg,#9aa0a6,#5f656b);
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.lamp .bloom{                                 /* 눈부심 번짐 */
  position:absolute;top:-34px;left:50%;transform:translateX(-50%);
  width:200px;height:140px;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,244,196,.75) 0%, rgba(255,232,150,.34) 34%, rgba(255,220,120,0) 70%);
  opacity:var(--lit);filter:blur(8px);
}
.lamp .flare{                                 /* 렌즈 플레어 십자 */
  position:absolute;top:31px;left:50%;
  background:linear-gradient(90deg,transparent,rgba(255,248,214,.85),transparent);
  opacity:calc(var(--lit)*var(--lit));        /* 밝을 때만 두드러지게 */
  filter:blur(1.2px);
}
.lamp .flare.h{width:190px;height:2.5px;transform:translateX(-50%)}
.lamp .flare.v{width:2.5px;height:74px;transform:translate(-50%,-36%);
  background:linear-gradient(180deg,transparent,rgba(255,248,214,.7),transparent)}
/* 빛기둥 — 아래로 갈수록 넓게 퍼져 수조 안 수초 전체를 비춘다 */
.beam{
  position:absolute;top:16px;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,
    rgba(255,244,200,calc(var(--lit)*.44)) 0%,
    rgba(255,241,190,calc(var(--lit)*.32)) 40%,
    rgba(255,238,178,calc(var(--lit)*.24)) 100%);
  /* 수초는 좌우 26~76%에 서 있다. 줄기 꼭대기 높이에서도 전부 덮이도록
     시작 폭을 넓히고 아래로 크게 퍼뜨린다. */
  clip-path:polygon(28% 0%, 72% 0%, 126% 100%, -26% 100%);
  filter:blur(8px);
}
/* 수초가 서 있는 영역 전체를 감싸는 확산광 */
.beam::before{
  content:'';position:absolute;left:8%;right:8%;bottom:18px;height:62%;border-radius:46% 46% 30% 30%;
  background:radial-gradient(ellipse at 50% 78%,
    rgba(255,246,205,calc(var(--lit)*.30)) 0%, transparent 74%);
  filter:blur(10px);
}
/* 바닥에 맺히는 光斑 — 빛이 수초 아래까지 닿았음을 보여준다 */
.beam::after{
  content:'';position:absolute;left:0;right:0;bottom:12px;height:34px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,246,205,calc(var(--lit)*.46)) 0%,transparent 76%);
  filter:blur(6px);
}

/* ---- 수초 · 기포 ---- */
.plant{
  --tilt:0deg;                                 /* 고온 시 시드는 기울기 — JS가 설정 */
  --amp:4.5deg;                                /* 흔들림 폭 */
  position:absolute;bottom:18px;
  transform-origin:bottom center;
  animation:sway 4.5s ease-in-out infinite;
  filter:drop-shadow(0 1px 2px rgba(0,20,10,.45));
}
.plant svg{display:block;overflow:visible}
/* 기울기와 흔들림을 함께 적용해, 시들어도 계속 흔들리게 한다 */
@keyframes sway{
  0%,100%{transform:rotate(calc(var(--tilt) - var(--amp)))}
  50%    {transform:rotate(calc(var(--tilt) + var(--amp)))}
}
/* 산소 분자(O₂) 모형 — 원자 두 개가 맞붙은 한 쌍 */
.bubble{position:absolute;animation:rise linear infinite}
.bubble::before,.bubble::after{
  content:'';position:absolute;top:0;width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 32% 28%,
    rgba(255,255,255,.97) 0%, rgba(226,242,255,.9) 42%, rgba(150,200,238,.82) 100%);
  box-shadow:inset -1.5px -2px 3px rgba(20,60,90,.28), 0 0 3px rgba(255,255,255,.5);
}
.bubble::before{left:-34%}
.bubble::after {left: 34%}
/* 수면으로 갈수록 수압이 낮아져 기포가 팽창한다 — 약 10배까지 부풀어 확실히 보이도록 */
@keyframes rise{
  0%  {transform:translateY(0)      translateX(0)    scale(.30);opacity:0}
  10% {opacity:.95}
  35% {transform:translateY(-72px)  translateX(5px)  scale(1.00)}
  70% {transform:translateY(-144px) translateX(-4px) scale(1.95)}
  88% {opacity:.92}
  100%{transform:translateY(-205px) translateX(8px)  scale(3.10);opacity:0}
}
/* ---- 🌈 피버 타임 ---- */
.bubble.fever::before,.bubble.fever::after{
  background:radial-gradient(circle at 32% 28%,
    rgba(255,255,255,.98) 0%, rgba(255,255,255,.75) 26%,
    hsl(var(--hue,0) 100% 72%) 58%, hsl(calc(var(--hue,0) + 60) 100% 62%) 100%);
  box-shadow:inset -1.5px -2px 3px rgba(60,0,80,.25),
             0 0 7px hsl(var(--hue,0) 100% 70% / .95);
  animation:hue 1.1s linear infinite;
}
@keyframes hue{to{filter:hue-rotate(360deg)}}
.tank.fever{
  box-shadow:0 10px 28px rgba(8,30,48,.34), inset 0 1px 0 rgba(255,255,255,.30),
             0 0 0 3px rgba(255,255,255,.5), 0 0 34px 6px rgba(255,180,255,.55);
  animation:feverGlow 1.5s ease-in-out infinite;
}
@keyframes feverGlow{50%{box-shadow:0 10px 28px rgba(8,30,48,.34),
  inset 0 1px 0 rgba(255,255,255,.30), 0 0 0 3px rgba(255,255,255,.62),
  0 0 52px 12px rgba(140,220,255,.7)}}
.fever-tag{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;
  padding:9px 18px;border-radius:99px;font-size:15px;font-weight:800;letter-spacing:.02em;
  color:#fff;white-space:nowrap;pointer-events:none;
  background:linear-gradient(90deg,#ff5f6d,#ffc371,#47e5bc,#5b8cff,#c86dd7);
  box-shadow:0 6px 22px rgba(0,0,0,.32);
  animation:tagPop .5s cubic-bezier(.2,1.5,.4,1) both;
}
@keyframes tagPop{from{opacity:0;transform:translate(-50%,-50%) scale(.6)}
                  to  {opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ---- 🔥 효소 변성 경고 ---- */
#danger{
  position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;
  box-shadow:inset 0 0 0 4px rgba(208,59,59,.85), inset 0 0 70px rgba(208,59,59,.42);
  transition:opacity .25s;
}
#danger.on{opacity:1;animation:pulseRed 1s ease-in-out infinite}
@keyframes pulseRed{50%{opacity:.42}}
.tank.danger .water{
  background:linear-gradient(180deg,rgba(255,150,140,.30) 0%,
    rgba(196,80,70,.30) 42%,rgba(92,26,26,.44) 100%);
}
.tank-status.hot{background:rgba(160,30,30,.62);border-color:rgba(255,140,140,.5)}

/* ---- 🌿 반려 검정말 마스코트 ---- */
.mascot{
  position:absolute;left:47%;bottom:118px;z-index:3;transform:translateX(-50%);
  pointer-events:none;transition:bottom .4s ease;
}
.mascot .face{
  display:block;font-size:30px;line-height:1;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.45));
  animation:bob 3s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(4deg)}}
.mascot.happy .face{animation:bounce .7s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-11px) scale(1.14)}}
.mascot.hot .face{animation:shiver .28s linear infinite}
@keyframes shiver{0%,100%{transform:translateX(-2px)}50%{transform:translateX(2px)}}
.mascot.gasp .face{animation:gasp 1s ease-in-out infinite}
@keyframes gasp{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
.mascot .zzz{position:absolute;top:-6px;left:26px;display:none}
.mascot.sleep .zzz{display:block}
.mascot.sleep .face{animation:bob 5s ease-in-out infinite}
.mascot .zzz i{
  position:absolute;font-style:normal;font-weight:800;color:#dff1ff;font-size:12px;
  text-shadow:0 1px 3px rgba(0,0,0,.5);opacity:0;animation:zzz 3s ease-out infinite;
}
.mascot .zzz i:nth-child(2){animation-delay:1s;font-size:14px}
.mascot .zzz i:nth-child(3){animation-delay:2s;font-size:16px}
@keyframes zzz{
  0%  {opacity:0;transform:translate(0,0) scale(.6)}
  25% {opacity:.95}
  100%{opacity:0;transform:translate(20px,-32px) scale(1.25)}
}

/* ---- 🏆 업적 · 토스트 ---- */
.shelf{
  max-width:1240px;margin:10px auto 0;display:flex;flex-wrap:wrap;
  gap:6px 10px;align-items:center;min-height:0;
}
.shelf-badges{display:flex;flex-wrap:wrap;gap:6px}
.mission-btn{
  display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;
  font:inherit;font-size:11.5px;font-weight:650;cursor:pointer;
  color:var(--series-1);background:color-mix(in srgb,var(--series-1) 10%,transparent);
  border:1px dashed color-mix(in srgb,var(--series-1) 55%,transparent);
}
.mission-btn:hover{background:color-mix(in srgb,var(--series-1) 18%,transparent)}
.mission-btn.done{
  color:#0a5c0a;border-style:solid;
  background:rgba(12,163,12,.14);border-color:rgba(12,163,12,.5);
}
.mission-btn.locked{
  color:var(--muted);background:transparent;border-color:var(--border);
}
.mission-btn.locked:hover{background:var(--page)}
/* 잠금 해제 순간 눈에 띄게 */
.mission-btn.just{animation:unlockPop .7s ease-out 2}
@keyframes unlockPop{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 color-mix(in srgb,var(--series-1) 55%,transparent)}
  40%    {transform:scale(1.09);box-shadow:0 0 0 7px transparent}
}
.badge-chip{
  display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;
  font-size:11.5px;font-weight:600;border:1px solid var(--border);
  background:var(--surface-1);color:var(--text-secondary);
}
.badge-chip.got{
  border-color:transparent;color:#3a2c00;
  background:linear-gradient(90deg,#ffe08a,#ffc94a);
  box-shadow:0 2px 8px rgba(220,170,40,.35);
}
.badge-chip .em{font-size:13px;filter:grayscale(1);opacity:.45}
.badge-chip.got .em{filter:none;opacity:1}
/* data-tip이 있는 요소 위에 올리면 안내를 보여준다 (배지 · 히든 미션 버튼) */
[data-tip]{position:relative}
.badge-chip{cursor:help}
[data-tip]::after{
  content:attr(data-tip);position:absolute;top:calc(100% + 8px);left:0;z-index:30;
  width:max-content;max-width:min(78vw,280px);padding:8px 11px;border-radius:9px;
  background:var(--text-primary);color:var(--page);font-size:12px;font-weight:500;
  line-height:1.45;white-space:normal;text-align:left;
  box-shadow:0 6px 20px rgba(0,0,0,.28);
  opacity:0;visibility:hidden;transform:translateY(-4px);
  transition:opacity .15s,transform .15s,visibility .15s;
}
[data-tip]::before{
  content:'';position:absolute;top:calc(100% + 2px);left:14px;z-index:31;
  border:5px solid transparent;border-bottom-color:var(--text-primary);
  opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;
}
[data-tip]:hover::after,[data-tip]:focus-visible::after{
  opacity:1;visibility:visible;transform:translateY(0)}
[data-tip]:hover::before,[data-tip]:focus-visible::before{opacity:1;visibility:visible}
/* 오른쪽 끝 요소는 툴팁이 화면 밖으로 나가지 않도록 반대쪽에 붙인다 */
.badge-chip:nth-last-child(-n+2)::after,.mission-btn::after{left:auto;right:0}
.badge-chip:nth-last-child(-n+2)::before,.mission-btn::before{left:auto;right:14px}
/* 잠긴 미션 버튼의 툴팁은 강조색으로 */
.mission-btn.locked::after{background:var(--series-1);color:#fff}
.mission-btn.locked::before{border-bottom-color:var(--series-1)}

.toasts{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:60;
  display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;
}
.toast{
  display:flex;align-items:center;gap:10px;padding:11px 17px;border-radius:12px;
  background:var(--surface-1);border:1px solid var(--border);
  box-shadow:0 8px 26px rgba(0,0,0,.24);font-size:13px;max-width:min(92vw,420px);
  animation:toastIn .35s cubic-bezier(.2,1.4,.4,1) both;
}
.toast.gold{background:linear-gradient(100deg,#fff6d9,#ffe9ab);border-color:#e9c766;color:#3a2c00}
.toast .em{font-size:24px;flex:none}
.toast b{display:block;font-size:13.5px;margin-bottom:1px}
.toast small{display:block;opacity:.8;font-size:12px;line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateY(-14px) scale(.94)}
                   to  {opacity:1;transform:translateY(0) scale(1)}}
.toast.out{animation:toastOut .3s ease-in forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px) scale(.96)}}

#confetti{position:fixed;inset:0;z-index:55;pointer-events:none;display:none}
#confetti.on{display:block}

/* ---- 💖 완주 축하 — 큰 하트 ---- */
#heart{
  position:fixed;inset:0;z-index:58;pointer-events:none;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:2vmin;
}
#heart.on{display:flex}
#heart .big{
  font-size:38vmin;line-height:1;
  filter:drop-shadow(0 0 6vmin rgba(255,90,140,.65));
  animation:heartBeat 1.05s ease-in-out infinite, heartIn .55s cubic-bezier(.2,1.6,.4,1) both;
}
@keyframes heartIn{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}
@keyframes heartBeat{
  0%,100%{transform:scale(1)}
  14%    {transform:scale(1.13)}
  28%    {transform:scale(1)}
  42%    {transform:scale(1.09)}
}
#heart .cap{
  font-size:clamp(17px,3.6vmin,30px);font-weight:800;color:#fff;
  padding:10px 26px;border-radius:99px;white-space:nowrap;
  background:linear-gradient(90deg,#ff5f6d,#ffc371,#47e5bc,#5b8cff,#c86dd7);
  box-shadow:0 8px 30px rgba(0,0,0,.34);
  animation:heartIn .55s .18s cubic-bezier(.2,1.6,.4,1) both;
}
#heart.out{animation:fadeOut .7s ease-in forwards}
@keyframes fadeOut{to{opacity:0}}
@media (prefers-reduced-motion:reduce){
  #heart .big{animation:heartIn .55s ease-out both}
}

/* ---- 미션 카드 ---- */
.mission{
  display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 12px;
  border-radius:10px;font-size:12.5px;line-height:1.45;
  background:color-mix(in srgb,var(--series-1) 9%,transparent);
  border:1px solid color-mix(in srgb,var(--series-1) 34%,transparent);
  color:var(--text-secondary);
}
.mission .em{font-size:19px;flex:none}
.mission b{color:var(--text-primary)}
.mission.done{background:rgba(12,163,12,.12);border-color:rgba(12,163,12,.45)}

/* ---- 사운드 토글 ---- */
.sound-btn{
  display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface-1);color:var(--text-secondary);
  font:inherit;font-size:12px;font-weight:550;cursor:pointer;
}
.sound-btn:hover{color:var(--text-primary)}
.sound-btn[aria-pressed="false"]{opacity:.6}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  max-width:1240px;margin:0 auto}
.topbar-btns{display:flex;gap:6px;flex:none;flex-wrap:wrap;justify-content:flex-end;align-items:center}
/* 음량 조절 */
.vol{
  display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface-1);
  font-size:12px;color:var(--text-secondary);
}
.vol[hidden]{display:none}
.vol input{
  width:82px;height:18px;margin:0;accent-color:var(--series-1);cursor:pointer;
  -webkit-appearance:auto;appearance:auto;opacity:1;position:static;
}
.vol #volVal{min-width:22px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
@media (pointer:coarse){ .vol input{width:104px;height:26px} }
.sound-btn[hidden]{display:none}
#installBtn{border-color:color-mix(in srgb,var(--series-1) 45%,transparent);
  color:var(--series-1);font-weight:650}
/* 설치 안내 단계 */
.steps{margin:12px 0 0;padding:0;list-style:none;counter-reset:s}
.steps li{position:relative;padding:7px 0 7px 30px;font-size:13px;line-height:1.5;
  border-top:1px solid var(--grid)}
.steps li::before{
  counter-increment:s;content:counter(s);position:absolute;left:0;top:8px;
  width:20px;height:20px;border-radius:50%;background:var(--series-1);color:#fff;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
.steps kbd{
  display:inline-block;padding:1px 6px;border-radius:5px;font:inherit;font-size:12px;
  background:var(--page);border:1px solid var(--border);
}
.modal-box.wide{max-width:440px}

.tank-status{
  position:absolute;left:22px;bottom:34px;z-index:4;font-size:12px;font-weight:600;
  color:#fff;background:rgba(8,28,44,.42);padding:4px 10px;border-radius:7px;
  border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(6px);
}

/* ---- buttons ---- */
.btn{
  position:relative;overflow:hidden;isolation:isolate;
  width:100%;padding:11px;border:0;border-radius:9px;background:var(--series-1);
  color:#fff;font:inherit;font-weight:650;cursor:pointer;
}
.btn:hover:not(:disabled){filter:brightness(1.08)}
.btn:disabled{cursor:not-allowed}
.btn .label{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:8px}
/* 측정 중 — 물이 차오르는 애니메이션 */
.btn .wave{position:absolute;left:0;right:0;bottom:0;height:0;z-index:1;
  background:rgba(255,255,255,.26)}
.btn .wave::before,.btn .wave::after{
  content:'';position:absolute;top:-9px;left:-50%;width:200%;height:18px;
  background:rgba(255,255,255,.26);border-radius:44%;
}
.btn .wave::before{animation:swirl 2.3s linear infinite}
.btn .wave::after {animation:swirl 3.1s linear infinite reverse;opacity:.65}
.btn.busy{background:var(--series-1);opacity:1}
.btn.busy .wave{animation:waveRise 4s linear forwards}
@keyframes waveRise{from{height:0}to{height:100%}}
@keyframes swirl{from{transform:rotate(0) translateX(0)}to{transform:rotate(360deg) translateX(0)}}
.spinner{
  width:15px;height:15px;border-radius:50%;flex:none;
  border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* 움직임 최소화 설정에서는 '장식' 모션만 끈다.
   기포는 개수와 속도가 산소 발생량을 나타내는 '정보'이므로 끄지 않고,
   좌우 흔들림과 크기 변화를 줄인 완만한 상승으로 대체한다. */
@media (prefers-reduced-motion:reduce){
  .btn .wave::before,.btn .wave::after{animation:none!important}
  .bubble{animation-name:riseCalm!important}
  .plant{--amp:2.2deg}                         /* 흔들림은 유지하되 폭을 줄인다 */
}
@keyframes riseCalm{
  0%  {transform:translateY(0)      scale(.35);opacity:0}
  15% {opacity:.9}
  60% {transform:translateY(-123px) scale(1.7)}
  85% {opacity:.85}
  100%{transform:translateY(-205px) scale(2.7);opacity:0}
}
.btn-ghost{
  width:auto;padding:6px 11px;background:transparent;color:var(--text-secondary);
  border:1px solid var(--border);font-size:12px;font-weight:550;border-radius:7px;cursor:pointer;
}
.btn-ghost:hover{color:var(--text-primary)}
.progress{height:3px;background:var(--grid);border-radius:2px;margin-top:9px;overflow:hidden}
.progress span{display:block;height:100%;width:0;background:var(--series-1);border-radius:2px}
.progress.run span{animation:fill 4s linear forwards}
@keyframes fill{to{width:100%}}

/* ---- table ---- */
.head-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.head-row h2{margin:0}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--grid);font-size:13px}
th{color:var(--muted);font-weight:550;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
th:first-child,td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:0}
td.avg{font-weight:650;color:var(--series-1)}
td.pending{color:var(--muted)}
/* 빈 상태 일러스트 */
/* 데이터가 없을 때 카드가 불필요하게 커지지 않도록 가로 배치로 압축 */
.empty{
  display:flex;align-items:center;gap:12px;
  color:var(--muted);text-align:left;padding:6px 2px 4px;font-size:13px;
}
.empty svg{opacity:.85;flex:none;width:44px;height:39px}
.empty > div{min-width:0}          /* 글자가 세로로 쪼개지지 않도록 */
.empty .lens{animation:hunt 4.2s ease-in-out infinite;transform-origin:60% 60%}
@keyframes hunt{
  0%,100%{transform:translate(0,0) rotate(0)}
  30%    {transform:translate(3px,-3px) rotate(-9deg)}
  65%    {transform:translate(-3px,2px) rotate(7deg)}
}
.empty b{display:block;color:var(--text-secondary);font-size:13.5px;font-weight:600}
.empty span{font-size:12.5px}
@media (prefers-reduced-motion:reduce){ .empty .lens{animation:none} }

/* ---- chart ---- */
.chart-wrap{position:relative}
/* 차트 SVG에만 적용 — 전역으로 두면 빈 상태 일러스트까지 늘어난다 */
#chart{display:block;width:100%;height:auto;overflow:visible}
.tip{
  position:absolute;pointer-events:none;background:var(--surface-1);
  border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.13);opacity:0;transition:opacity .1s;
  font-variant-numeric:tabular-nums;white-space:nowrap;z-index:5;
}
.tip.on{opacity:1}
.tip b{font-size:14px}

/* ---- footer opts ---- */
.opt{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:var(--text-secondary);
  margin-top:12px;padding-top:12px;border-top:1px solid var(--grid);cursor:pointer}
.opt input{accent-color:var(--series-1);margin:1px 0 0;flex:none}

/* ---- modal ---- */
.modal{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.45);padding:22px;
}
.modal[hidden]{display:none}
.modal-box{
  background:var(--surface-1);border:1px solid var(--border);border-radius:14px;
  padding:22px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.28);
  animation:pop .16s ease-out;
}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-box h3{margin:0 0 8px;font-size:16px;font-weight:650}
.modal-box p{margin:0 0 18px;font-size:13.5px;color:var(--text-secondary);line-height:1.55}
.modal-box strong{color:var(--text-primary)}
.modal-btns{display:flex;gap:8px;align-items:center}
.modal-btns .btn-ghost{flex:none;min-height:44px}
#modalForm{margin:0 0 16px}
#modalForm[hidden]{display:none}
#modalInput{
  width:100%;padding:11px 13px;border-radius:9px;font:inherit;font-size:15px;
  border:1.5px solid var(--border);background:var(--page);color:var(--text-primary);
}
#modalInput:focus{outline:none;border-color:var(--series-1);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--series-1) 22%,transparent)}
.err{margin:7px 0 0!important;font-size:12px;color:#d03b3b!important}
.err[hidden]{display:none}
/* 개인정보 안내 */
.notice{
  display:flex;gap:8px;align-items:flex-start;margin-top:14px;padding:10px 12px;
  border-radius:9px;font-size:12.5px;line-height:1.5;
  background:rgba(250,178,25,.13);border:1px solid rgba(250,178,25,.5);
  color:var(--text-secondary);
}
.notice b{color:var(--text-primary)}

/* ---- 🏅 명예의 전당 ---- */
.hall{max-width:1240px;margin:0 auto;padding:0 20px 40px}
.hall .card{margin:0}
.heroes{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.hero{
  display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:99px;
  font-size:13px;font-weight:600;color:#3a2c00;
  background:linear-gradient(90deg,#ffe9b5,#ffd76e);
  border:1px solid rgba(220,170,40,.5);
  animation:heroIn .4s cubic-bezier(.2,1.5,.4,1) both;
}
@keyframes heroIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.hero .rank{
  width:19px;height:19px;border-radius:50%;flex:none;
  background:rgba(58,44,0,.16);font-size:10.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.hero time{font-size:11px;font-weight:500;opacity:.7}
.hero.mine{box-shadow:0 0 0 3px color-mix(in srgb,var(--series-1) 40%,transparent)}

/* =========================================================
   태블릿 / 터치 환경
   - 1000px 이상: 2단 (태블릿 가로, 데스크톱)
   - 1000px 미만: 1단 (태블릿 세로, 모바일)
   ========================================================= */
@media (max-width:999px){
  main{grid-template-columns:1fr;gap:14px}
}
/* 태블릿 세로에서는 좌우 패널을 다시 2단으로 나눠 세로 스크롤을 줄인다 */
@media (min-width:700px) and (max-width:999px){
  main{grid-template-columns:1fr 1fr;align-items:start}
  main > section:first-child{grid-column:1 / -1}
  main > section:first-child > .card:first-child{display:grid;
    grid-template-columns:minmax(0,320px) minmax(0,1fr);gap:0 20px;align-items:start}
  main > section:first-child > .card:first-child > .tabs{grid-column:1 / -1}
  main > section:first-child > .card:first-child > .tank{margin-bottom:0}
  main > section:first-child > .card:first-child > #condWarn{grid-column:1 / -1}
}
/* 터치: 히트 영역을 손가락 크기로 */
@media (pointer:coarse){
  body{font-size:15px}
  .tab{padding:13px 8px;font-size:14px}
  .btn{padding:15px;font-size:15px;min-height:52px}
  .btn-ghost{padding:10px 14px;font-size:13px;min-height:44px}
  input[type=range]{height:32px}
  input[type=range]::-webkit-slider-thumb{width:28px;height:28px}
  input[type=range]::-moz-range-thumb{width:28px;height:28px}
  th,td{padding:10px 8px;font-size:14px}
  .opt{font-size:13px;padding:14px 0 2px}
  .opt input{width:20px;height:20px}
  .tip{display:none}          /* 터치에는 호버 툴팁이 뜨지 않으므로 숨긴다 */
}
@media (max-width:520px){
  header{padding:16px 14px 0}
  main{padding:12px 14px 40px}
  h1{font-size:17px}
  .card{padding:14px}
  .head-row{flex-wrap:wrap;gap:8px}
  .tank{height:210px}
}
.head-btns{display:flex;gap:6px;flex-wrap:wrap}

<body>

<header>
  <div class="topbar">
    <div>
      <h1>산소 팡팡! 광합성 타이쿤</h1>
      <p class="sub">검정말의 산소 발생량을 측정하여 빛의 세기 · 이산화 탄소 농도 · 온도의 영향을 알아봅시다.</p>
    </div>
    <div class="topbar-btns">

        <span>📲</span><span>홈 화면에 추가</span>
      </button>

        <span id="soundIcon">🔇</span><span id="soundText">소리 켜기</span>

      <label class="vol" id="volBox" hidden>
        <span aria-hidden="true">🔈</span>
        <input type="range" id="vol" min="0" max="100" step="5" value="50"
               aria-label="음량">

<script>
"use strict";

/* ---------------------------------------------------------------
   탐구 설정 — 조작 변인 1개, 나머지는 통제 변인으로 고정
----------------------------------------------------------------*/
const TABS = [
  // Y축은 세 탐구 모두 0~2.4로 통일 — 탐구 간 크기 비교가 가능하고,
  // 노이즈 포함 최대치(탐구1·2 = 2.21, 탐구3 = 2.28)도 잘리지 않는다.
  { key:'light', name:'빛의 세기', unit:'%',  min:0, max:100, step:10, fixed:{co2:100, temp:30}, yMax:2.4 },
  { key:'co2',   name:'CO₂ 농도',  unit:'%',  min:0, max:100, step:10, fixed:{light:100, temp:30}, yMax:2.4 },
  { key:'temp',  name:'온도',      unit:'°C', min:0, max:50,  step:1,  fixed:{light:100, co2:100}, yMax:2.4 },
];
const LABEL = { light:'빛의 세기', co2:'CO₂ 농도', temp:'온도' };
const UNIT  = { light:'%', co2:'%', temp:'°C' };
const RANGE = { light:[0,100,10], co2:[0,100,10], temp:[0,50,1] };

/* ---------------------------------------------------------------
   상태
----------------------------------------------------------------*/
const state = {
  activeTab: 0,
  light: 100, co2: 100, temp: 25,
  experiments: [ {}, {}, {} ],   // 탭별 { 조작변인값: [측정값…] }
  isMeasuring: false,
  stableNoise: true,   // 저신호 구간에서 절대오차가 신호를 덮으므로 기본 ON (아래 measure() 주석 참고)
};

/* ---------------------------------------------------------------
   산소 생성량 모델  (PRD 3.2)
----------------------------------------------------------------*/
const fL = l => l / (l + 15);                       // 포화 곡선
const fC = c => c / (c + 15);                       // 포화 곡선
/* 효소 활성 — 35°C에서 정점, 25~35°C가 모두 적정 구간(88~100%)이 되도록
   완만한 사인 곡선을 쓴다. 35°C를 넘으면 효소가 변성되어 급격히 떨어지고
   45°C에서 0이 된다. (기존 (t/35)²는 25°C에서 51%밖에 나오지 않아
   '적정 온도 25~35°C'라는 생물학적 사실과 맞지 않았다.) */
const fT = t => t <= 35
  ? Math.pow(Math.sin(Math.PI / 2 * t / 35), 1.2)
  : Math.max(0, 1 - (t - 35) / 10);

function baseRate(light, co2, temp){
  return 2.5 * Math.min(fL(light), fC(co2)) * fT(temp);   // 최소량의 법칙
}
function measure(light, co2, temp){
  if (light === 0 || co2 === 0) return 0;
  const base = baseRate(light, co2, temp);
  // 기본은 PRD 명세대로 절대 오차 ±0.1. 저신호 구간에서는 오차가 신호를
  // 압도하므로(예: 10°C에서 오차 비중 56%) 비례 오차 모드를 함께 제공한다.
  const noise = state.stableNoise
    ? base * (Math.random() * 0.1 - 0.05)
    : Math.random() * 0.2 - 0.1;
  return Math.round(Math.max(0, base + noise) * 100) / 100;
}

/* ---------------------------------------------------------------
   조작부 렌더
----------------------------------------------------------------*/
const $ = id => document.getElementById(id);

const ICON  = { light:'☀️', co2:'💨', temp:'🌡️' };
const THEME = { light:['#f6cd63','#eda100'], co2:['#63d3ac','#1baf7a'], temp:['#f59b72','#eb6834'] };

/* DOM은 탭 전환 시 한 번만 만든다 — 드래그 중 재생성하면 조작이 끊긴다 */
function renderControls(){
  const cfg = TABS[state.activeTab];
  $('controls').innerHTML = ['light','co2','temp'].map(k => {
    const [mn, mx, st] = RANGE[k];
    const [a, b] = THEME[k];
    return `
      <div class="ctrl" data-ctrl="${k}">
        <div class="ctrl-top">
          <span class="ctrl-label">${LABEL[k]}<span class="badge"></span><span class="flagbox"></span></span>
          <span class="ctrl-val"></span>
        </div>
        <div class="slider" style="--fill-a:${a};--fill-b:${b}">
          <span class="track"></span><span class="fill"></span>
          <input type="range" data-k="${k}" min="${mn}" max="${mx}" step="${st}"
                 value="${state[k]}" aria-label="${LABEL[k]}">
          <span class="thumb">${ICON[k]}</span>
        </div>
        <div class="ticks"><span>${mn}${UNIT[k]}</span><span>${mx}${UNIT[k]}</span></div>
      </div>`;
  }).join('');

  $('controls').querySelectorAll('input[type=range]').forEach(el => {
    // 드래그 중에는 가벼운 갱신만, 손을 떼면 표·그래프까지 갱신
    el.addEventListener('input', e => {
      if (state.isMeasuring) return;
      const v = Number(e.target.value);
      if (v !== state[e.target.dataset.k]) Sfx.tick();   // '드르륵' — 눈금이 바뀔 때만
      state[e.target.dataset.k] = v;
      syncControls(); renderTank(); renderHint();
    });
    el.addEventListener('change', () => {
      if (state.isMeasuring) return;
      renderCondWarn(); renderTable(); renderChart(); renderHint();
    });
  });
  syncControls();
}

/* 값·채움·손잡이 위치만 갱신 (DOM 재생성 없음) */
function syncControls(){
  const cfg = TABS[state.activeTab];
  $('controls').querySelectorAll('.ctrl').forEach(box => {
    const k = box.dataset.ctrl;
    const [mn, mx] = RANGE[k];
    const isCtl = k !== cfg.key;
    const off   = isCtl && state[k] !== cfg.fixed[k];
    const pct   = (state[k] - mn) / (mx - mn);

    box.querySelector('.ctrl-val').textContent = `${state[k]}${UNIT[k]}`;
    const badge = box.querySelector('.badge');
    badge.textContent = isCtl ? '통제 변인' : '조작 변인';
    badge.classList.toggle('ctl', isCtl);
    box.querySelector('.flagbox').innerHTML =
      off ? `<span class="flag">권장 ${cfg.fixed[k]}${UNIT[k]}</span>` : '';

    box.querySelector('.fill').style.width  = (pct * 100) + '%';
    // 손잡이가 트랙 밖으로 나가지 않도록 폭(32px)만큼 보정
    box.querySelector('.thumb').style.left  = `calc(${pct * 100}% + ${16 - pct * 32}px)`;

    const input = box.querySelector('input');
    input.disabled = state.isMeasuring;
    if (Number(input.value) !== state[k]) input.value = state[k];
    box.querySelector('.slider').classList.toggle('off', state.isMeasuring);
  });
}

/* 현재 통제 변인 조합의 서명 — 측정값마다 함께 기록해 조건이 섞이는 것을 막는다 */
function condSig(){
  const cfg = TABS[state.activeTab];
  return ['light','co2','temp'].filter(k => k !== cfg.key)
    .map(k => `${k}=${state[k]}`).join(' · ');
}
function condText(sig){
  return sig.split(' · ')
    .map(p => { const [k,v] = p.split('='); return `${LABEL[k]} ${v}${UNIT[k]}`; })
    .join(', ');
}

/* 표에 현재와 다른 통제 조건의 데이터가 섞여 있으면 경고 */
function renderCondWarn(){
  const cur = condSig();
  const stale = rows().filter(r => r.cond !== cur);
  if (!stale.length){ $('condWarn').innerHTML = ''; return; }
  const conds = [...new Set(stale.map(r => r.cond))];
  $('condWarn').innerHTML = `
    <div class="warn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1.6 15 14H1L8 1.6Z" stroke="#b07400" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8 6v3.4M8 11.6v.6" stroke="#b07400" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div>
        <strong>통제 조건이 다른 데이터가 섞여 있습니다.</strong><br>
        표에서 <span class="flag">다른 조건</span> 표시가 붙은 행은
        ${conds.map(condText).join(' / ')} 조건에서 측정한 값이라
        지금 조건(${condText(cur)})과 직접 비교할 수 없습니다.
        그래프에는 현재 조건의 데이터만 그려집니다.
        <br><button class="btn-ghost" id="dropStale">다른 조건 데이터 삭제</button>
      </div>
    </div>`;
  $('dropStale').addEventListener('click', () => {
    const store = state.experiments[state.activeTab];
    Object.keys(store).forEach(k => { if (store[k].cond !== cur) delete store[k]; });
    renderCondWarn(); renderTable(); renderChart(); renderHint();
  });
}

/* ---------------------------------------------------------------
   수조 시각화
----------------------------------------------------------------*/
/* 검정말 한 포기를 SVG로 그린다.
   실제 검정말은 줄기를 따라 작은 잎이 3~5장씩 돌려나기(輪生)로 촘촘히 달린다. */
function plantSVG(h, seed){
  const W = 34;                                  // 좌우 여유
  const rnd = (n => () => (n = (n * 9301 + 49297) % 233280) / 233280)(seed * 7919 + 13);
  const bend = (rnd() - 0.5) * 9;                // 줄기가 휘는 정도
  const stemX = t => bend * Math.sin(t * Math.PI * 0.9);   // t: 0(위) ~ 1(아래)

  // 줄기
  let d = `M${stemX(1).toFixed(1)},${h}`;
  for (let t = 1; t >= 0; t -= 0.1) d += ` L${stemX(t).toFixed(1)},${(h*t).toFixed(1)}`;

  // 잎 — 아래에서 위로 마디마다 좌우 한 쌍씩, 위로 갈수록 촘촘하고 짧게
  const gap = 7.5, leaves = [];
  for (let y = h - 4; y > 3; y -= gap){
    const t = y / h;                             // 1(아래) ~ 0(위)
    const x = stemX(t);
    const grow = 0.45 + t * 0.55;                // 아래쪽 잎이 더 길다
    const L = (7.5 + rnd() * 3.5) * grow;
    const V = 1.5 + rnd() * 0.6;                 // 잎 두께
    // 좌우 한 쌍 + 마디마다 각도를 조금씩 비틀어 돌려나기처럼 보이게
    const lift = 26 + rnd() * 16;                // 위로 들린 각도
    [-1, 1].forEach((side, k) => {
      const a = side * (90 - lift) + (rnd() - 0.5) * 14;
      leaves.push(
        `<path d="M0 0C${(L*0.32).toFixed(1)} ${-V} ${(L*0.72).toFixed(1)} ${(-V*0.75).toFixed(1)} ${L.toFixed(1)} 0` +
        `C${(L*0.72).toFixed(1)} ${(V*0.75).toFixed(1)} ${(L*0.32).toFixed(1)} ${V} 0 0Z"` +
        ` transform="translate(${x.toFixed(1)} ${y.toFixed(1)}) rotate(${a.toFixed(1)})"/>`);
    });
    // 중간중간 앞쪽으로 난 잎을 하나 더 얹어 밀도를 준다
    if (rnd() > 0.45){
      const L2 = L * 0.7, a2 = (rnd() - 0.5) * 40 - 90;
      leaves.push(
        `<path d="M0 0C${(L2*0.32).toFixed(1)} ${-V} ${(L2*0.72).toFixed(1)} ${(-V*0.7).toFixed(1)} ${L2.toFixed(1)} 0` +
        `C${(L2*0.72).toFixed(1)} ${(V*0.7).toFixed(1)} ${(L2*0.32).toFixed(1)} ${V} 0 0Z"` +
        ` transform="translate(${x.toFixed(1)} ${y.toFixed(1)}) rotate(${a2.toFixed(1)})" opacity=".82"/>`);
    }
  }

  const gid = `pg${seed}`;
  return `<svg width="${W}" height="${h}" viewBox="${-W/2} 0 ${W} ${h}">
      <defs><linearGradient id="${gid}" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0"   stop-color="#166b32"/>
        <stop offset=".55" stop-color="#2e9e51"/>
        <stop offset="1"   stop-color="#5fd47e"/>
      </linearGradient></defs>
      <g fill="url(#${gid})">${leaves.join('')}</g>
      <path d="${d}" fill="none" stroke="url(#${gid})" stroke-width="2.1" stroke-linecap="round"/>
    </svg>`;
}

let wasHot = false;

function renderTank(){
  const tank = $('tank');
  // 빛의 세기는 CSS 변수 하나로 전구·번짐·플레어·빛기둥을 함께 구동한다
  tank.style.setProperty('--lit', (state.light / 100).toFixed(3));

  // 40°C 이상 — 효소 변성 경고
  const hot = state.temp >= 40;
  tank.classList.toggle('danger', hot);
  $('danger').classList.toggle('on', hot);
  $('tankStatus').classList.toggle('hot', hot);
  if (hot && !wasHot) Sfx.warn();                        // 경계를 넘는 순간에만 울린다
  wasHot = hot;

  tank.classList.toggle('fever', isFever());

  // 검정말 — 배치는 고정, 온도에 따라 색이 바래고 고온에서는 갈변한다
  const box = $('plants');
  box.innerHTML = '';
  const vitality = fT(state.temp);                       // 0~1
  const wither = Math.min(1, Math.max(0, (state.temp - 36) / 10));  // 갈변 정도
  const PLANTS = [[26,112],[38,150],[52,96],[64,132],[76,84]];
  PLANTS.forEach(([leftPct, h], i) => {
    const p = document.createElement('div');
    p.className = 'plant';
    p.style.left = leftPct + '%';
    p.style.marginLeft = '-17px';                // SVG 폭(34px)의 절반만큼 당겨 중심 정렬
    p.innerHTML = plantSVG(h, i + 1);
    // 줄기마다 주기와 시작점을 달리해 자연스럽게 일렁이도록
    p.style.animationDelay = (-i * 0.85) + 's';
    p.style.animationDuration = (3.8 + (i % 3) * 0.7) + 's';
    p.style.setProperty('--amp', (3.4 + (i % 3) * 1.3) + 'deg');
    // 조명을 받으면 잎이 실제로 밝아지도록 빛의 세기를 밝기에 반영한다
    const litF = state.light / 100;
    p.style.filter =
      `saturate(${(0.28 + vitality * 0.72).toFixed(2)}) ` +
      `brightness(${(0.46 + vitality * 0.26 + litF * 0.44).toFixed(2)}) ` +
      `sepia(${wither.toFixed(2)}) hue-rotate(${(-wither * 45).toFixed(0)}deg)`;
    // 시들면 한쪽으로 기울지만 흔들림은 계속된다
    p.style.setProperty('--tilt', ((i % 2 ? 1 : -1) * wither * 16).toFixed(1) + 'deg');
    box.appendChild(p);
  });

  renderMascot();
}

function renderBubbles(rate){
  const box = $('bubbles');
  box.innerHTML = '';
  if (rate <= 0) return;
  const fever = isFever();
  // 피버 타임에는 훨씬 많이, 훨씬 빠르게
  const n   = fever ? 60 : Math.min(30, Math.round(rate / 2.4 * 30));
  const dur = fever ? 0.85 : 3.4 - Math.min(rate / 2.4, 1) * 2.0;
  for (let i = 0; i < n; i++){
    const b = document.createElement('div');
    b.className = 'bubble' + (fever ? ' fever' : '');
    // 시작 지름 — 상승하며 3.1배까지 부푼다
    const size = (fever ? 3.4 : 2.8) + Math.random() * 2.4;
    b.style.width = b.style.height = size + 'px';
    b.style.left = (fever ? 16 + Math.random() * 68 : 24 + Math.random() * 52) + '%';
    b.style.bottom = (28 + Math.random() * 60) + 'px';
    b.style.animationDuration = (dur + Math.random() * (fever ? 0.3 : 0.9)) + 's';
    b.style.animationDelay = (Math.random() * (fever ? 0.8 : 2.2)) + 's';
    if (fever) b.style.setProperty('--hue', Math.round(Math.random() * 360));
    box.appendChild(b);
  }
}

/* 저장 키 = 조작 변인값 + 통제 조건 (조건마다 독립적으로 3회를 쌓는다) */
const slotKey = (x, cond) => `${cond}|${x}`;

/* 현재 조작 변인값 + 현재 통제 조건에서의 측정 기록 */
function currentSlot(){
  const cfg = TABS[state.activeTab];
  return state.experiments[state.activeTab][slotKey(state[cfg.key], condSig())] || null;
}

function renderHint(){
  if (state.isMeasuring) return;
  const cfg  = TABS[state.activeTab];
  const n    = currentSlot() ? currentSlot().m.length : 0;
  const done = n >= 3;
  // 버튼은 비활성화하지 않는다 — 눌렀을 때 안내 팝업이 뜨는 것이 요구사항
  $('measureBtn').disabled = false;
  $('measureLabel').textContent = done ? '3회 측정 완료 — 변인을 조절하세요' : '산소 생성량 측정하기';
  $('measureHint').textContent = n === 0
    ? '같은 조건에서 3회 측정하면 평균이 계산되어 그래프에 표시됩니다.'
    : done
      ? `${cfg.name} ${state[cfg.key]}${cfg.unit} 조건은 측정이 끝났습니다. 변인을 조절해 다음 조건을 측정하세요.`
      : `현재 조건(${state[cfg.key]}${cfg.unit})에서 ${n}회 측정했습니다. ${3 - n}회 더 측정하세요.`;
}

/* ---------------------------------------------------------------
   측정 프로세스 (PRD 3.3)
----------------------------------------------------------------*/
function startMeasure(){
  if (state.isMeasuring) return;
  const cfg = TABS[state.activeTab];

  // 이미 3회를 채운 조건이면 측정하지 않고 안내한다
  const slot = currentSlot();
  if (slot && slot.m.length >= 3){
    openModal(
      '3회 측정 완료',
      `${cfg.name} ${state[cfg.key]}${cfg.unit} 조건에서는 이미 3회 측정을 마쳤습니다.<br>
       <strong>변인을 조절해 주세요.</strong> 다른 조건에서 측정해야 그래프가 이어집니다.`
    );
    return;
  }

  const result = measure(state.light, state.co2, state.temp);

  state.isMeasuring = true;
  const btn = $('measureBtn');
  btn.disabled = true;
  btn.classList.remove('busy'); void btn.offsetWidth; btn.classList.add('busy');
  $('measureLabel').innerHTML = `<span class="spinner"></span>산소 발생량 측정 중…`;
  $('resetBtn').disabled = true;
  syncControls();
  $('tankStatus').textContent = '측정 중…';
  $('measureHint').textContent = '4초간 발생하는 기포를 관찰하세요.';
  const bar = $('progress');
  bar.classList.remove('run'); void bar.offsetWidth; bar.classList.add('run');
  renderBubbles(result);

  // 🌈 피버 타임
  const fever = isFever();
  if (fever){
    const tag = document.createElement('div');
    tag.className = 'fever-tag';
    tag.id = 'feverTag';
    tag.textContent = '🌈 슈퍼 광합성 모드!';
    $('tank').appendChild(tag);
    Sfx.fever();
    award('fever');
  }
  Sfx.bubbleLoop(fever ? 3.2 : result);

  setTimeout(() => {
    const x = state[cfg.key];
    const sig = condSig();
    const store = state.experiments[state.activeTab];
    // 통제 조건까지 키에 포함해야 조건을 바꿔도 기존 측정이 지워지지 않는다
    const key = slotKey(x, sig);
    if (!store[key]) store[key] = { x, m: [], cond: sig };
    store[key].m.push(result);                 // 3회 도달 시 startMeasure에서 이미 차단됨

    state.isMeasuring = false;
    btn.classList.remove('busy');
    $('resetBtn').disabled = false;
    $('tankStatus').textContent = `측정값 ${result.toFixed(2)} ml/분`;
    bar.classList.remove('run');
    $('bubbles').innerHTML = '';
    const tag = document.getElementById('feverTag');
    if (tag) tag.remove();
    syncControls();
    renderCondWarn(); renderTable(); renderChart(); renderHint();

    if (state.temp >= 50) award('mad');              // 🧪 매드 사이언티스트
    checkMission(result);
    checkBadges();
    renderMission();                                 // 잠금 안내의 남은 개수 갱신
  }, 4000);
}

function rows(){
  const cur = condSig();
  return Object.values(state.experiments[state.activeTab])
    .map(({ x, m, cond }) => ({
      x, m, cond,
      avg: m.length === 3 ? m.reduce((s,v) => s+v, 0) / 3 : null,
    }))
    // 현재 조건을 위로 모으고, 그 안에서 조작 변인값 순으로 정렬
    .sort((a,b) => (a.cond === cur ? 0 : 1) - (b.cond === cur ? 0 : 1)
                || a.cond.localeCompare(b.cond)

}

/* ---------------------------------------------------------------
   꺾은선 그래프 — 3회 완료된 점만
----------------------------------------------------------------*/
const W = 460, H = 280, PAD = { t:14, r:18, b:44, l:52 };
const PW = W - PAD.l - PAD.r, PH = H - PAD.t - PAD.b;

/* 단조 3차 보간(Fritsch–Carlson) → 베지에 경로.
   일반 Catmull-Rom 스플라인은 곡선이 측정값 위아래로 튀어(overshoot)
   측정하지 않은 극값을 만들어낸다. 실험 그래프에서는 없는 데이터를
   그려내는 셈이라, 구간 단조성을 보장하는 이 방식을 쓴다. */
function splinePath(P){
  const n = P.length;
  if (n < 2) return '';
  if (n === 2) return `M${P[0][0]},${P[0][1]}L${P[1][0]},${P[1][1]}`;

  const dx = [], dy = [], slope = [];
  for (let i = 0; i < n-1; i++){
    dx[i] = P[i+1][0] - P[i][0];
    dy[i] = P[i+1][1] - P[i][1];
    slope[i] = dy[i] / dx[i];
  }
  // 각 점의 접선 기울기 m[i]
  const m = [slope[0]];
  for (let i = 1; i < n-1; i++){
    m[i] = slope[i-1] * slope[i] <= 0 ? 0 : (slope[i-1] + slope[i]) / 2;  // 극값에서 평평하게
  }
  m[n-1] = slope[n-2];
  // 단조성 보정 — 접선이 구간 기울기의 3배를 넘지 않도록 제한
  for (let i = 0; i < n-1; i++){
    if (slope[i] === 0){ m[i] = m[i+1] = 0; continue; }
    const a = m[i] / slope[i], b = m[i+1] / slope[i], h = Math.hypot(a, b);
    if (h > 3){ m[i] = 3 * a / h * slope[i]; m[i+1] = 3 * b / h * slope[i]; }
  }
  let d = `M${P[0][0]},${P[0][1]}`;
  for (let i = 0; i < n-1; i++){
    const t = dx[i] / 3;
    d += `C${P[i][0]+t},${P[i][1]+m[i]*t} ${P[i+1][0]-t},${P[i+1][1]-m[i+1]*t} ${P[i+1][0]},${P[i+1][1]}`;
  }
  return d;
}

function renderChart(){
  const cfg  = TABS[state.activeTab];
  const cur  = condSig();
  // 3회 완료 + 현재 통제 조건에서 측정한 데이터만 그린다
  const pts  = rows().filter(r => r.avg !== null && r.cond === cur);
  const yMax = cfg.yMax;
  const sx = v => PAD.l + (v - cfg.min) / (cfg.max - cfg.min) * PW;
  const sy = v => PAD.t + PH - (v / yMax) * PH;

  $('chartTitle').textContent = `${cfg.name}에 따른 산소 생성량`;

  const yTicks = 4, xTicks = 5;
  let s = '';

  // 그리드 + Y축 눈금
  for (let i = 0; i <= yTicks; i++){
    const v = yMax * i / yTicks, y = sy(v);
    s += `<line x1="${PAD.l}" y1="${y}" x2="${PAD.l+PW}" y2="${y}"
            stroke="var(--grid)" stroke-width="1"/>`;
    s += `<text x="${PAD.l-9}" y="${y+4}" text-anchor="end" font-size="11"
            fill="var(--muted)" style="font-variant-numeric:tabular-nums">${v.toFixed(1)}</text>`;
  }
  // X축 눈금
  for (let i = 0; i <= xTicks; i++){
    const v = cfg.min + (cfg.max - cfg.min) * i / xTicks, x = sx(v);
    s += `<text x="${x}" y="${PAD.t+PH+18}" text-anchor="middle" font-size="11"
            fill="var(--muted)" style="font-variant-numeric:tabular-nums">${Math.round(v)}</text>`;
  }
  // 축선
  s += `<line x1="${PAD.l}" y1="${PAD.t+PH}" x2="${PAD.l+PW}" y2="${PAD.t+PH}"
          stroke="var(--baseline)" stroke-width="1"/>`;
  // 축 이름
  s += `<text x="${PAD.l+PW/2}" y="${H-6}" text-anchor="middle" font-size="11.5"
          fill="var(--text-secondary)">${cfg.name} (${cfg.unit})</text>`;
  s += `<text x="14" y="${PAD.t+PH/2}" text-anchor="middle" font-size="11.5"
          fill="var(--text-secondary)" transform="rotate(-90 14 ${PAD.t+PH/2})">산소 생성량 (ml/분)</text>`;

  if (!pts.length){
    const cx = PAD.l + PW/2, cy = PAD.t + PH/2;
    s += `<g transform="translate(${cx-30},${cy-40})" opacity=".9">
            <path d="M6 46 Q16 22 26 30 T46 8" fill="none" stroke="var(--grid)"
                  stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 5"/>
            <circle cx="6"  cy="46" r="4" fill="var(--grid)"/>
            <circle cx="26" cy="30" r="4" fill="var(--grid)"/>
            <circle cx="46" cy="8"  r="4" fill="var(--grid)"/>
          </g>
          <text x="${cx}" y="${cy+30}" text-anchor="middle" font-size="13"
            font-weight="600" fill="var(--text-secondary)">그래프가 비어 있어요</text>
          <text x="${cx}" y="${cy+48}" text-anchor="middle" font-size="12"
            fill="var(--muted)">한 조건에서 3회 측정을 마치면 점이 찍힙니다</text>`;
  } else {
    if (pts.length > 1){
      s += `<path d="${splinePath(pts.map(p => [sx(p.x), sy(p.avg)]))}"
              fill="none" stroke="var(--series-1)" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>`;
    }
    pts.forEach(p => {
      // 겹침 대비 2px 서피스 링
      s += `<circle cx="${sx(p.x)}" cy="${sy(p.avg)}" r="5"
              fill="var(--series-1)" stroke="var(--surface-1)" stroke-width="2"/>`;
    });
    // 단일 계열이므로 범례 없음. 양 끝점만 직접 라벨.
    const ends = pts.length > 1 ? [pts[0], pts[pts.length-1]] : [pts[0]];
    ends.forEach(p => {
      s += `<text x="${sx(p.x)}" y="${sy(p.avg)-11}" text-anchor="middle" font-size="11"
              font-weight="650" fill="var(--text-primary)"
              style="font-variant-numeric:tabular-nums">${p.avg.toFixed(2)}</text>`;
    });
    // 히트 타깃 (마크보다 크게)
    pts.forEach(p => {
      s += `<circle cx="${sx(p.x)}" cy="${sy(p.avg)}" r="16" fill="transparent"
              data-x="${p.x}" data-y="${p.avg.toFixed(2)}" class="hit" style="cursor:pointer"/>`;
    });
  }

  const svg = $('chart');
  svg.innerHTML = s;

  // 호버 툴팁
  const tip = $('tip');
  svg.querySelectorAll('.hit').forEach(h => {
    h.addEventListener('mouseenter', e => {
      const r = svg.getBoundingClientRect();
      const scale = r.width / W;
      tip.innerHTML = `${cfg.name} ${h.dataset.x}${cfg.unit}<br><b>${h.dataset.y}</b> ml/분`;
      tip.classList.add('on');
      tip.style.left = (Number(h.getAttribute('cx')) * scale - tip.offsetWidth/2) + 'px';
      tip.style.top  = (Number(h.getAttribute('cy')) * scale - tip.offsetHeight - 12) + 'px';
    });
    h.addEventListener('mouseleave', () => tip.classList.remove('on'));
  });
}

/* ---------------------------------------------------------------
   🔊 사운드 — 음원 파일 없이 Web Audio로 합성 (오프라인 동작)
----------------------------------------------------------------*/
const Sfx = {
  ctx:null, on:false, master:null, lastTick:0, timers:[], volume:0.5,

  enable(){
    if (!this.ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.volume;
      this.master.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.on = true;
    return true;
  },
  disable(){ this.on = false; this.stopLoop(); },

  /* 음량 0~100 → 게인. 사람 귀에는 로그 스케일이 자연스러우므로 제곱을 쓴다 */
  setVolume(pct){
    this.volume = Math.pow(pct / 100, 2) * 1.4;
    if (this.master) this.master.gain.setTargetAtTime(this.volume, this.ctx.currentTime, 0.02);
  },

  /* 기본 음원 한 방울 */
  blip({freq=600, to=null, dur=0.12, type='sine', gain=0.25, at=0, sweep='exponential'}={}){
    if (!this.on || !this.ctx) return;
    const t = this.ctx.currentTime + at;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (to) o.frequency[sweep === 'linear' ? 'linearRampToValueAtTime'
                                           : 'exponentialRampToValueAtTime'](to, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.02);
  },

  /* 슬라이더 '드르륵' — 기계식 다이얼 */
  tick(){
    if (!this.on || !this.ctx) return;
    const now = this.ctx.currentTime;
    if (now - this.lastTick < 0.028) return;       // 빠른 드래그에서 소리가 뭉치지 않도록
    this.lastTick = now;
    this.blip({freq:1500 + Math.random()*260, to:520, dur:0.028, type:'square', gain:0.055});
  },

  /* 기포 '뾱' — 위로 휘는 짧은 물방울 소리 */
  bloop(pitch=1, gain=0.2, at=0){
    this.blip({freq:300*pitch, to:900*pitch, dur:0.11, type:'sine', gain, at});
    this.blip({freq:900*pitch, to:1500*pitch, dur:0.05, type:'sine', gain:gain*0.35, at:at+0.01});
  },

  /* 측정 4초 동안 생성량에 비례해 기포음을 뿌린다
     적으면 '뾱… 뾱…', 많으면 '뽀로로로록!!' */
  bubbleLoop(rate, seconds=4){
    if (!this.on || !this.ctx) return;
    this.stopLoop();
    const norm = Math.min(rate / 2.2, 1);              // 0~1
    const perSec = 1.6 + norm * 13;                    // 초당 방울 수
    const total = Math.round(perSec * seconds);
    for (let i = 0; i < total; i++){
      const at = (i / perSec) + Math.random() * 0.05;
      if (at > seconds) break;
      const pitch = 0.72 + norm * 0.5 + Math.random() * 0.34;
      this.bloop(pitch, 0.055 + norm * 0.1, at);
    }
  },
  stopLoop(){ this.timers.forEach(clearTimeout); this.timers = []; },

  /* 효소 변성 경고음 '삐-삐-삐-' */
  warn(){
    if (!this.on || !this.ctx) return;
    [0, 0.22, 0.44].forEach(at =>
      this.blip({freq:880, to:880, dur:0.13, type:'square', gain:0.13, at}));
  },

  /* 피버 타임 팡파르 */
  fever(){
    if (!this.on || !this.ctx) return;
    [523,659,784,1047,1319].forEach((f,i) =>
      this.blip({freq:f, to:f, dur:0.22, type:'triangle', gain:0.16, at:i*0.075}));
  },

  /* 업적 획득 팡파르 */
  fanfare(){
    if (!this.on || !this.ctx) return;
    [523,659,784,1047].forEach((f,i) =>
      this.blip({freq:f, to:f, dur:0.3, type:'triangle', gain:0.15, at:i*0.11}));
    this.blip({freq:1568, to:1568, dur:0.5, type:'triangle', gain:0.13, at:0.44});
  },
};

  const { light, co2, temp } = state;
  if (temp >= 40)                     return { cls:'hot',   face:'🥵', msg:'너무 더워요!' };
  if (co2 <= 5)                       return { cls:'gasp',  face:'😵', msg:'숨을 못 쉬겠어요…' };
  if (light <= 5)                     return { cls:'sleep', face:'😴', msg:'너무 깜깜해요…' };
  if (temp <= 8)                      return { cls:'cold',  face:'🥶', msg:'너무 추워요' };
  if (light >= 90 && co2 >= 90 && temp >= 32 && temp <= 38)
                                      return { cls:'happy', face:'😎', msg:'최고의 컨디션!' };
  if (light >= 70 && co2 >= 70 && temp >= 25)

}

function completedCount(tab){
  const store = state.experiments[tab];
  const byCond = {};
  Object.values(store).forEach(({ m, cond }) => {
    if (m.length === 3) byCond[cond] = (byCond[cond] || 0) + 1;
  });
  return Math.max(0, ...Object.values(byCond), 0);
}

  if (completedCount(state.activeTab) >= 5) award('collector');
  if ([0,1,2].every(t => completedCount(t) >= 5)) award('master');
}

/* --- 🎆 컨페티 --- */
function confetti(count = 150){
  const cv = $('confetti'), ctx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  cv.classList.add('on');
  const COLORS = ['#2a78d6','#eda100','#1baf7a','#eb6834','#e34948','#c86dd7','#47e5bc'];
  const bits = Array.from({length:count}, (_,i) => ({
    x: innerWidth * (0.15 + Math.random() * 0.7),
    y: innerHeight * 0.5 - Math.random() * 60,
    vx: (Math.random() - 0.5) * 13,
    vy: -7 - Math.random() * 13,
    w: 6 + Math.random() * 7, h: 8 + Math.random() * 9,
    rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.35,
    c: COLORS[i % COLORS.length],
  }));
  let frames = 0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    bits.forEach(b => {
      b.vy += 0.34; b.x += b.vx; b.y += b.vy; b.rot += b.vr; b.vx *= 0.995;
      ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
      ctx.fillStyle = b.c; ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
      ctx.restore();
    });
    if (++frames < 240) requestAnimationFrame(tick);
    else { ctx.clearRect(0,0,cv.width,cv.height); cv.classList.remove('on'); }
  })();
}

----------------------------------------------------------------*/
let lastFocus = null;
let onSubmit = null;                                  // 입력형 팝업의 확인 처리기

function openModal(title, html, wide){
  lastFocus = document.activeElement;
  onSubmit = null;
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = html;
  $('modalForm').hidden = true;
  $('modalCancel').hidden = true;
  $('modalOk').textContent = '확인';
  $('modal').querySelector('.modal-box').classList.toggle('wide', !!wide);
  $('modal').hidden = false;
  $('modalOk').focus();
}

/* 입력을 받는 팝업 — handler가 문자열을 반환하면 오류로 표시하고 닫지 않는다 */
function openPrompt(title, html, { placeholder, okText = '확인', cancelText = '건너뛰기', handler }){
  openModal(title, html);
  const input = $('modalInput');
  input.value = '';
  input.placeholder = placeholder || '';
  $('modalErr').hidden = true;
  $('modalForm').hidden = false;
  $('modalCancel').hidden = false;
  $('modalCancel').textContent = cancelText;
  $('modalOk').textContent = okText;
  onSubmit = handler;
  setTimeout(() => input.focus(), 60);
}

function closeModal(){
  $('modal').hidden = true;
  onSubmit = null;
  if (lastFocus) lastFocus.focus();
}

function submitModal(){
  if (!onSubmit) return closeModal();
  const err = onSubmit($('modalInput').value);
  if (err){                                          // 검증 실패 — 열어둔 채 안내
    $('modalErr').textContent = err;
    $('modalErr').hidden = false;
    $('modalInput').focus();
    return;
  }
  closeModal();
}

$('modalOk').addEventListener('click', submitModal);
$('modalCancel').addEventListener('click', closeModal);
$('modalForm').addEventListener('submit', e => { e.preventDefault(); submitModal(); });
$('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !$('modal').hidden) closeModal(); });

/* 별명은 사용자 입력이므로 화면에 그릴 때 반드시 이스케이프한다 */
const esc = s => String(s).replace(/[&<>"']/g,

  try {
    const raw = localStorage.getItem(HALL_KEY);
    heroes = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(heroes)) heroes = [];
  } catch { heroes = []; }
}

function addHero(nameRaw){
  const name = nameRaw.trim().replace(/\s+/g, ' ');
  if (!name)            return '별명을 입력해 주세요.';
  if (name.length > 12) return '별명은 12자까지 입력할 수 있습니다.';
  // 학번·학급·전화번호처럼 보이는 입력을 막는 안전장치 (명단은 모두에게 공개된다)
  const digits = name.replace(/\D/g, '');
  if (digits.length >= 5 ||
      /01[016-9][-\s.]?\d{3,4}/.test(name) ||
      (/\d/.test(name) && /(학년|학반|[0-9]\s*반|[0-9]\s*번|번호)/.test(name)))
    return '학번·학급·전화번호처럼 보이는 정보는 쓸 수 없습니다. 개인정보가 아닌 별명을 적어 주세요.';
  if (heroes.some(h => h.name.toLowerCase() === name.toLowerCase()))
    return '이미 기록된 별명입니다. 다른 별명을 써 주세요.';

  const d = new Date(), p = n => String(n).padStart(2, '0');
  const rec = {
    name,
    date: `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`,
    iso : d.toISOString(),
    at  : d.getTime(),
  };
  heroes.push(rec);
  myHero = rec.at;
  saveHeroes();
  renderHeroes();
  toast('🏅', '명예의 전당에 올랐습니다!', `<b>${esc(name)}</b> 님, 축하합니다.`, true);
  // 방금 등록된 칩으로 스크롤
  setTimeout(() => $('heroes').scrollIntoView({ behavior:'smooth', block:'center' }), 250);
  return null;
}

function askNickname(){
  openPrompt('🎯 히든 미션 성공!',
    `산소 생성량을 정확히 <b>1.5 ml/분</b>에 맞췄습니다!<br>
     화면 아래 <b>성공자 명단</b>에 남길 별명을 적어 주세요.
     <span class="notice">
       <span aria-hidden="true">🔒</span>
       <span>적은 별명은 이 화면을 보는 <b>모두에게 공개</b>됩니다.
       실명·학번·전화번호 같은 <b>개인정보는 적지 마세요.</b></span>
     </span>`,
    { placeholder:'예) 광합성왕', okText:'명단에 올리기', cancelText:'건너뛰기',
      handler: addHero });
}

$('clearHeroes').addEventListener('click', () => {
  openPrompt('기록을 모두 지울까요?',
    `성공자 <b>${heroes.length}명</b>의 기록이 이 기기에서 삭제됩니다.
     되돌릴 수 없습니다.<br><br>
     지우려면 아래에 <b>삭제</b> 라고 입력하세요.`,
    { placeholder:'삭제', okText:'모두 지우기', cancelText:'취소',
      handler: v => {
        if (v.trim() !== '삭제') return '"삭제" 라고 정확히 입력해 주세요.';
        heroes = []; myHero = null; saveHeroes(); renderHeroes();
        return null;
      } });
});

/* ---------------------------------------------------------------
   내보내기
----------------------------------------------------------------*/
function download(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function stamp(){
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;
}

function exportCSV(){
  const cfg = TABS[state.activeTab];
  const data = rows();
  if (!data.length){ openModal('내보낼 데이터 없음', '먼저 산소 생성량을 측정해 주세요.'); return; }

  const q = v => `"${String(v).replace(/"/g,'""')}"`;
  const lines = [
    [q(`탐구 ${state.activeTab+1} · ${cfg.name}`)],
    [q('조작 변인'), q(cfg.name)],
    [q('측정 오차 모드'), q(state.stableNoise ? '비례 오차 ±5%' : '절대 오차 ±0.1')],
    [],
    [q(`${cfg.name} (${cfg.unit})`), q('1회'), q('2회'), q('3회'), q('평균 (ml/분)'), q('통제 변인')],
    ...data.map(r => [
      r.x,
      ...[0,1,2].map(i => r.m[i] === undefined ? '' : r.m[i].toFixed(2)),
      r.avg === null ? '' : r.avg.toFixed(2),
      q(condText(r.cond)),
    ]),
  ].map(row => row.join(',')).join('\r\n');

  // Excel이 UTF-8로 인식하도록 BOM을 붙인다
  download(new Blob(['﻿' + lines], {type:'text/csv;charset=utf-8'}),
           `광합성_탐구${state.activeTab+1}_${cfg.name}_${stamp()}.csv`);
}

function exportPNG(){
  const cfg = TABS[state.activeTab];
  if (!rows().filter(r => r.avg !== null && r.cond === condSig()).length){
    openModal('내보낼 그래프 없음', '3회 측정이 완료된 데이터가 있어야 그래프를 저장할 수 있습니다.');
    return;
  }
  const SCALE = 2, TITLE_H = 34;                     // 고해상도 + 제목 여백
  const src = $('chart');

  // CSS 변수는 SVG를 분리하면 풀리므로 계산된 색으로 치환한다
  const cs = getComputedStyle(document.body);
  const map = ['--surface-1','--grid','--baseline','--muted','--text-primary','--text-secondary','--series-1']
    .reduce((o,k) => (o[k] = cs.getPropertyValue(k).trim(), o), {});
  let markup = src.innerHTML.replace(/var\((--[a-z0-9-]+)\)/gi, (m,k) => map[k] || m);

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W*SCALE}" height="${(H+TITLE_H)*SCALE}"
      viewBox="0 0 ${W} ${H+TITLE_H}">
      <rect width="${W}" height="${H+TITLE_H}" fill="${map['--surface-1']}"/>
      <text x="${W/2}" y="21" text-anchor="middle" font-size="14" font-weight="650"
        fill="${map['--text-primary']}"
        font-family="system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif">${
          cfg.name}에 따른 산소 생성량</text>
      <text x="${W/2}" y="${H+TITLE_H-7}" text-anchor="middle" font-size="10"
        fill="${map['--muted']}"
        font-family="system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif">통제 변인: ${
          condText(condSig())}</text>
      <g transform="translate(0,${TITLE_H})"
         font-family="system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif">${markup}</g>
    </svg>`;

  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas');
    cv.width = W*SCALE; cv.height = (H+TITLE_H)*SCALE;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = map['--surface-1'];
    ctx.fillRect(0,0,cv.width,cv.height);
    ctx.drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b => download(b, `광합성_탐구${state.activeTab+1}_${cfg.name}_${stamp()}.png`), 'image/png');
  };
  img.onerror = () => openModal('내보내기 실패', '그래프를 이미지로 변환하지 못했습니다.');
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

/* ---------------------------------------------------------------
   이벤트
----------------------------------------------------------------*/
$('csvBtn').addEventListener('click', exportCSV);
$('pngBtn').addEventListener('click', exportPNG);

$('restoreBtn').addEventListener('click', () => {
  if (state.isMeasuring) return;
  Object.assign(state, TABS[state.activeTab].fixed);
  renderAll();
});

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => switchTab(Number(t.dataset.tab))));

$('measureBtn').addEventListener('click', startMeasure);

$('resetBtn').addEventListener('click', () => {
  if (state.isMeasuring) return;
  state.experiments[state.activeTab] = {};
  $('tankStatus').textContent = '대기 중';
  renderCondWarn(); renderTable(); renderChart(); renderHint();
});

$('stableNoise').addEventListener('change', e => { state.stableNoise = e.target.checked; });

loadHeroes();
renderHeroes();
renderShelf();
switchTab(0);
</script>
